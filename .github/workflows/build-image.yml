name: Build & push image to GHCR

# Builds the Dockerfile and publishes the container to GitHub Container Registry.
# From there it can be mirrored into the Mattoni dev ACR (transfer-images pipeline)
# or imported with `az acr import` if you ever get the rights.

on:
  workflow_dispatch: {}        # run manually from the Actions tab
  push:
    branches: [main]           # also rebuild when main changes
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - '.github/workflows/build-image.yml'

env:
  IMAGE: ghcr.io/janecv0/excel-mcp-test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:0.1.7
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
